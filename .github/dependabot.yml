version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - '*'
      github-actions-security:
        applies-to: security-updates
        patterns:
          - '*'
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    groups:
      npm:
        applies-to: version-updates
        patterns:
          - '*'
      npm-security:
        applies-to: security-updates
        patterns:
          - '*'
